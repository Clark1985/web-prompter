<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>极简自用提词器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        textarea { width: 100%; height: 200px; border-radius: 8px; padding: 10px; }
        button { background: #007AFF; color: white; border: none; padding: 15px 30px; border-radius: 8px; margin-top: 10px; width: 100%; font-size: 16px; }
        #preview { display: none; }
    </style>
</head>
<body>
    <h2>极简提词器</h2>
    <textarea id="textInput" placeholder="在此粘贴你的录像文案..."></textarea>
    <button id="startBtn">开启悬浮提词</button>
    
    <canvas id="canvas" width="400" height="300" style="display:none;"></canvas>
    <video id="video" playsinline muted style="display:none;"></video>

    <script>
        const textInput = document.getElementById('textInput');
        const startBtn = document.getElementById('startBtn');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('video');

        let yPos = 300;
        
        function draw() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00FF00"; // 经典的提词器绿
            ctx.font = "bold 24px sans-serif";
            ctx.textAlign = "center";
            
            const lines = textInput.value.split('\n');
            lines.forEach((line, i) => {
                ctx.fillText(line, canvas.width / 2, yPos + (i * 40));
            });

            yPos -= 1; // 滚动速度
            if (yPos < -lines.length * 40) yPos = 300;
            requestAnimationFrame(draw);
        }

        startBtn.onclick = async () => {
            draw();
            // 将 Canvas 转换为视频流
            const stream = canvas.captureStream(30);
            video.srcObject = stream;
            video.play();
            
            try {
                // 触发 iOS 画中画
                if (video !== document.pictureInPictureElement) {
                    await video.requestPictureInPicture();
                }
            } catch (error) {
                alert('PiP 启动失败，请确保使用 Safari 浏览器打开此页面');
            }
        };
    </script>
</body>
</html>
