<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>网页提词器</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        textarea {
            width: 90%;
            max-width: 600px;
            height: 40vh;
            background-color: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #444;
            border-radius: 8px;
            padding: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            width: 90%;
            max-width: 600px;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #ffffff;
            background-color: #007aff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: #0056b3;
        }
        .hidden-elements {
            display: none;
        }
    </style>
</head>
<body>

    <h1>网页悬浮提词器</h1>
    <textarea id="text-input" placeholder="请在这里粘贴您的台词..."></textarea>
    <button id="start-pip-btn">启动悬浮提词</button>

    <div class="hidden-elements">
        <canvas id="teleprompter-canvas" width="600" height="800"></canvas>
        <video id="pip-video" playsinline muted></video>
    </div>

    <script>
        const textInput = document.getElementById('text-input');
        const startBtn = document.getElementById('start-pip-btn');
        const canvas = document.getElementById('teleprompter-canvas');
        const video = document.getElementById('pip-video');
        const ctx = canvas.getContext('2d');

        let animationFrameId = null;

        startBtn.addEventListener('click', async () => {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
            
            if (!document.pictureInPictureEnabled) {
                alert('您的浏览器不支持画中画功能。');
                return;
            }

            try {
                video.srcObject = canvas.captureStream(30);
                await video.play();
                startScrollingAnimation();
                await video.requestPictureInPicture();
            } catch (error) {
                console.error('启动画中画失败:', error);
                // 这里是更新过的代码，会弹出更详细的错误
                alert(`启动失败，请检查系统设置或浏览器权限。\n\n错误类型: ${error.name}\n错误信息: ${error.message}`);
            }
        });
        
        video.addEventListener('leavepictureinpicture', () => {
            if (animationFrameId) {
                cancelAnimationFrame(animationFrameId);
                animationFrameId = null;
            }
        });

        function startScrollingAnimation() {
            const text = textInput.value;
            const lines = text.split('\n');
            const scrollSpeed = 0.8;
            const lineHeight = 45;
            const font = 'bold 32px sans-serif';
            let yOffset = canvas.height;

            function draw() {
                ctx.fillStyle = 'black';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#00ff00';
                ctx.font = font;
                ctx.textAlign = 'center';
                for (let i = 0; i < lines.length; i++) {
                    ctx.fillText(lines[i], canvas.width / 2, yOffset + (i * lineHeight));
                }
                yOffset -= scrollSpeed;
                const totalTextHeight = lines.length * lineHeight;
                if (yOffset < -totalTextHeight) {
                    yOffset = canvas.height;
                }
                animationFrameId = requestAnimationFrame(draw);
            }
            draw();
        }
    </script>

</body>
</html>
