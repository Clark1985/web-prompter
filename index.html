<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 自研全能提词相机</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: sans-serif; }
        
        /* 1. 背景相机预览 */
        #cameraView { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); /* 镜像，符合自拍习惯 */ }

        /* 2. 提词器画布层 */
        #prompterCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* 3. 控制界面层 */
        .ui-layer { position: absolute; bottom: 30px; left: 0; width: 100%; z-index: 3; display: flex; flex-direction: column; align-items: center; }
        .control-panel { background: rgba(0,0,0,0.6); padding: 15px; border-radius: 20px; width: 90%; max-width: 400px; backdrop-filter: blur(10px); }
        textarea { width: 100%; height: 80px; background: transparent; border: 1px solid #555; color: #fff; border-radius: 10px; padding: 10px; box-sizing: border-box; margin-bottom: 10px; }
        .btn-group { display: flex; gap: 10px; }
        button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        #startBtn { background: #ff3b30; color: white; } /* 红色录制感 */
        #settingsBtn { background: #333; color: white; }
        
        .speed-row { display: flex; align-items: center; color: #fff; font-size: 12px; margin-top: 10px; }
        input[type="range"] { flex: 1; margin: 0 10px; }
    </style>
</head>
<body>

<video id="cameraView" autoplay playsinline muted></video>
<canvas id="prompterCanvas"></canvas>

<div class="ui-layer" id="uiLayer">
    <div class="control-panel">
        <textarea id="textInput" placeholder="在此输入录制文案..."></textarea>
        <div class="speed-row">
            <span>🐢</span>
            <input type="range" id="speedInput" min="0.5" max="10" step="0.1" value="2.0">
            <span>🐇</span>
        </div>
        <div class="btn-group">
            <button id="settingsBtn" onclick="toggleUI()">收起设置</button>
            <button id="startBtn">开始拍摄</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('cameraView');
    const canvas = document.getElementById('prompterCanvas');
    const ctx = canvas.getContext('2d');
    const textInput = document.getElementById('textInput');
    const speedInput = document.getElementById('speedInput');
    const startBtn = document.getElementById('startBtn');
    const uiLayer = document.getElementById('uiLayer');

    let isPlaying = false;
    let startTime;
    let textLines = [];
    let animationId;

    // 1. 初始化相机
    async function initCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: 1280, height: 720 }, 
                audio: true 
            });
            video.srcObject = stream;
        } catch (err) {
            alert("无法访问摄像头，请检查 Safari 权限设置");
        }
    }

    // 2. 画布尺寸适配
    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resizeCanvas;
    resizeCanvas();

    // 3. 提词逻辑
    function wrapText(text) {
        ctx.font = 'bold 30px sans-serif';
        const lines = [];
        const words = text.split('');
        let line = '';
        const maxWidth = canvas.width * 0.8;
        for (let n = 0; n < words.length; n++) {
            if (words[n] === '\n') { lines.push(line); line = ''; continue; }
            if (ctx.measureText(line + words[n]).width > maxWidth) {
                lines.push(line); line = words[n];
            } else { line += words[n]; }
        }
        lines.push(line);
        return lines;
    }

    function draw() {
        if (!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 提词区域背景阴影（方便看清文字）
        ctx.fillStyle = "rgba(0,0,0,0.3)";
        ctx.fillRect(0, 50, canvas.width, 250);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 32px sans-serif';
        ctx.textAlign = 'center';
        
        const elapsed = (Date.now() - startTime) / 1000;
        const speed = parseFloat(speedInput.value);
        let yPos = 280 - (speed * elapsed * 30); // 从上方开始滚

        textLines.forEach((line, i) => {
            const drawY = yPos + (i * 45);
            if (drawY > 50 && drawY < 300) {
                ctx.fillText(line, canvas.width / 2, drawY);
            }
        });

        animationId = requestAnimationFrame(draw);
    }

    startBtn.onclick = () => {
        if (!isPlaying) {
            const content = textInput.value.trim();
            if (!content) return alert("请先输入文案");
            textLines = wrapText(content);
            startTime = Date.now();
            isPlaying = true;
            startBtn.innerText = "停止录制";
            draw();
            // 这里可以添加 MediaRecorder 逻辑来保存视频
        } else {
            isPlaying = false;
            cancelAnimationFrame(animationId);
            startBtn.innerText = "开始拍摄";
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    };

    function toggleUI() {
        const panel = document.querySelector('.control-panel');
        if (panel.style.display === 'none') {
            panel.style.display = 'block';
            document.getElementById('settingsBtn').innerText = "收起设置";
        } else {
            panel.style.display = 'none';
            document.getElementById('settingsBtn').innerText = "展开设置";
        }
    }

    initCamera();
</script>
</body>
</html>
