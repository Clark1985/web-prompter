<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极客自研提词器</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f2f2f7; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        textarea { width: 100%; max-width: 400px; height: 180px; border-radius: 12px; border: 1px solid #ccc; padding: 15px; font-size: 16px; margin-bottom: 20px; outline: none; }
        .controls { width: 100%; max-width: 400px; background: white; padding: 20px; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); }
        .speed-control { display: flex; align-items: center; margin-bottom: 20px; gap: 10px; }
        input[type="range"] { flex: 1; }
        button { width: 100%; background: #007aff; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: 600; cursor: pointer; }
        /* 核心改动：Video 不能 display:none，设为 1px 并透明 */
        #streamVideo { position: fixed; bottom: 0; right: 0; width: 1px; height: 1px; opacity: 0.01; pointer-events: none; }
        #prompterCanvas { display: none; }
    </style>
</head>
<body>

    <h2>🚀 极简提词器</h2>
    <textarea id="textInput" placeholder="在此粘贴录像文案..."></textarea>
    
    <div class="controls">
        <div class="speed-control">
            <span>🐢</span>
            <input type="range" id="speedInput" min="0.5" max="8" step="0.1" value="2">
            <span>🐇</span>
        </div>
        <button id="pipBtn">一键开启悬浮窗</button>
    </div>

    <canvas id="prompterCanvas" width="600" height="800"></canvas>
    <video id="streamVideo" muted playsinline></video>

    <script>
        const textInput = document.getElementById('textInput');
        const pipBtn = document.getElementById('pipBtn');
        const speedInput = document.getElementById('speedInput');
        const canvas = document.getElementById('prompterCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('streamVideo');

        let yOffset = canvas.height;
        let textLines = [];
        let isPlaying = false;

        // 文字排版逻辑
        function wrapText(text) {
            ctx.font = 'bold 50px sans-serif'; 
            const words = text.split('');
            let line = '';
            const lines = [];
            const maxWidth = canvas.width - 80;

            for (let n = 0; n < words.length; n++) {
                if (words[n] === '\n') { lines.push(line); line = ''; continue; }
                let testLine = line + words[n];
                if (ctx.measureText(testLine).width > maxWidth) {
                    lines.push(line);
                    line = words[n];
                } else { line = testLine; }
            }
            lines.push(line);
            return lines;
        }

        // 渲染循环
        function animate() {
            if (!isPlaying) return;
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00FF00'; // 提词器经典的绿色，对比度最高
            ctx.font = 'bold 50px sans-serif';
            ctx.textAlign = 'left';

            textLines.forEach((line, i) => {
                const drawY = yOffset + (i * 75);
                if (drawY > -80 && drawY < canvas.height + 80) {
                    ctx.fillText(line, 40, drawY);
                }
            });

            yOffset -= parseFloat(speedInput.value);
            if (yOffset < -(textLines.length * 75)) yOffset = canvas.height;
            requestAnimationFrame(animate);
        }

        // 核心按钮点击事件
        pipBtn.onclick = async () => {
            const content = textInput.value.trim();
            if (!content) return alert("请输入文案");

            // 1. 初始化数据
            textLines = wrapText(content);
            yOffset = canvas.height;
            isPlaying = true;
            animate();

            // 2. 核心补丁：先获取流，立刻赋值，立刻播放
            try {
                if (!video.srcObject) {
                    video.srcObject = canvas.captureStream(30);
                }
                
                await video.play();

                // 3. 触发画中画
                if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                } else {
                    alert("当前浏览器不支持画中画");
                }
            } catch (e) {
                console.error(e);
                // 终极提示：如果是 file:// 协议，Safari 会拦截
                if (location.protocol === 'file:') {
                    alert("Safari 安全限制：请不要直接双击打开 HTML，请将其部署到 Vercel 或使用本地服务器访问。");
                } else {
                    alert("启动失败，请重试");
                }
            }
        };

        video.addEventListener('leavepictureinpicture', () => {
            isPlaying = false;
            pipBtn.innerText = "一键开启悬浮窗";
        });
    </script>
</body>
</html>
