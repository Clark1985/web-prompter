<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍摄提词一体机 v8.0</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #cameraView { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        #prompterCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        /* 录制状态灯 */
        #recIndicator {
            position: absolute; top: 20px; left: 20px; z-index: 4;
            display: none; align-items: center; color: white; font-size: 14px; font-weight: bold;
        }
        .dot { width: 12px; height: 12px; background: red; border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }

        .ui-layer { position: absolute; bottom: 40px; left: 0; width: 100%; z-index: 3; display: flex; flex-direction: column; align-items: center; }
        .control-panel { background: rgba(0,0,0,0.7); padding: 20px; border-radius: 24px; width: 85%; max-width: 400px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        textarea { width: 100%; height: 100px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: #fff; border-radius: 12px; padding: 12px; box-sizing: border-box; margin-bottom: 15px; font-size: 16px; outline: none; }
        .btn-group { display: flex; gap: 12px; }
        button { flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        #startBtn { background: #ff3b30; color: white; }
        #settingsBtn { background: #3a3a3c; color: white; }
        .speed-row { display: flex; align-items: center; color: #fff; font-size: 13px; margin-top: 15px; }
        input[type="range"] { flex: 1; margin: 0 10px; }
    </style>
</head>
<body>

<div id="recIndicator"><div class="dot"></div> REC ● <span id="timer">00:00</span></div>
<video id="cameraView" autoplay playsinline muted></video>
<canvas id="prompterCanvas"></canvas>

<div class="ui-layer" id="uiLayer">
    <div class="control-panel" id="panel">
        <textarea id="textInput" placeholder="在此粘贴你的录制文案..."></textarea>
        <div class="speed-row">
            <span>🐢</span>
            <input type="range" id="speedInput" min="1" max="15" step="0.5" value="3">
            <span>🐇</span>
        </div>
        <div class="btn-group" style="margin-top: 15px;">
            <button id="settingsBtn" onclick="toggleUI()">收起设置</button>
            <button id="startBtn">开始拍摄</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('cameraView');
    const canvas = document.getElementById('prompterCanvas');
    const ctx = canvas.getContext('2d');
    const startBtn = document.getElementById('startBtn');
    const recIndicator = document.getElementById('recIndicator');
    const timerDisplay = document.getElementById('timer');
    
    let isRecording = false;
    let startTime;
    let textLines = [];
    let mediaRecorder;
    let recordedChunks = [];
    let timerInterval;
    let stream;

    // 1. 初始化相机和流
    async function init() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                audio: true 
            });
            video.srcObject = stream;
            resizeCanvas();
        } catch (err) {
            alert("请授权摄像头和麦克风权限，否则无法录制。");
        }
    }

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resizeCanvas;

    // 2. 提词排版
    function getLines(text) {
        ctx.font = 'bold 32px sans-serif';
        const lines = [];
        const chars = text.split('');
        let line = '';
        const maxWidth = canvas.width * 0.85;
        for (let char of chars) {
            if (char === '\n') { lines.push(line); line = ''; continue; }
            if (ctx.measureText(line + char).width > maxWidth) {
                lines.push(line); line = char;
            } else { line += char; }
        }
        lines.push(line);
        return lines;
    }

    // 3. 渲染循环
    function render() {
        if (!isRecording) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 提词背景蒙层
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(0, 80, canvas.width, 300);

        ctx.fillStyle = '#00FF00';
        ctx.font = 'bold 34px sans-serif';
        ctx.textAlign = 'center';
        
        const elapsed = (Date.now() - startTime) / 1000;
        const speed = parseFloat(document.getElementById('speedInput').value);
        let yPos = 350 - (speed * elapsed * 25); 

        textLines.forEach((line, i) => {
            const drawY = yPos + (i * 50);
            if (drawY > 80 && drawY < 380) {
                ctx.fillText(line, canvas.width / 2, drawY);
            }
        });
        requestAnimationFrame(render);
    }

    // 4. 录制逻辑
    startBtn.onclick = () => {
        if (!isRecording) {
            const content = document.getElementById('textInput').value.trim();
            if (!content) return alert("文案在哪里？");
            
            // 开始录制准备
            recordedChunks = [];
            textLines = getLines(content);
            startTime = Date.now();
            isRecording = true;
            
            // 初始化录制器
            const options = { mimeType: 'video/mp4' }; // iOS Safari 支持格式
            mediaRecorder = new MediaRecorder(stream);
            
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };

            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                
                // 自动触发下载/保存提示
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = url;
                a.download = `提词录制_${new Date().getTime()}.mp4`;
                document.body.appendChild(a);
                a.click();
                
                setTimeout(() => {
                    URL.revokeObjectURL(url);
                    alert("录制已完成！视频已尝试保存到“文件”或弹出下载提示。");
                }, 100);
            };

            mediaRecorder.start();
            startBtn.innerText = "停止并保存";
            recIndicator.style.display = 'flex';
            startTimer();
            render();
            // 自动收起面板以便拍摄
            document.getElementById('panel').style.display = 'none';
            document.getElementById('settingsBtn').innerText = "展开设置";
        } else {
            stopRecording();
        }
    };

    function stopRecording() {
        isRecording = false;
        mediaRecorder.stop();
        clearInterval(timerInterval);
        recIndicator.style.display = 'none';
        startBtn.innerText = "开始拍摄";
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function startTimer() {
        let sec = 0;
        timerInterval = setInterval(() => {
            sec++;
            const m = String(Math.floor(sec / 60)).padStart(2, '0');
            const s = String(sec % 60).padStart(2, '0');
            timerDisplay.innerText = `${m}:${s}`;
        }, 1000);
    }

    function toggleUI() {
        const panel = document.getElementById('panel');
        const btn = document.getElementById('settingsBtn');
        if (panel.style.display === 'none') {
            panel.style.display = 'block';
            btn.innerText = "收起设置";
        } else {
            panel.style.display = 'none';
            btn.innerText = "展开设置";
        }
    }

    init();
</script>
</body>
</html>
