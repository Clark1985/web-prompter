<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 拍摄提词一体机 v11.0</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        #cameraView { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        #prompterCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        #recIndicator { 
            position: absolute; top: 50px; left: 20px; z-index: 4; display: none; 
            align-items: center; color: white; font-size: 14px; font-weight: bold; 
            background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; 
        }
        .dot { width: 10px; height: 10px; background: #ff3b30; border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .ui-layer { position: absolute; bottom: 40px; left: 0; width: 100%; z-index: 3; display: flex; flex-direction: column; align-items: center; }
        .control-panel { 
            background: rgba(0,0,0,0.7); padding: 20px; border-radius: 24px; width: 90%; 
            max-width: 450px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); box-sizing: border-box; 
        }
        #textInput { 
            width: 100%; height: 100px; background: rgba(255,255,255,0.1); border: 1px solid #444; 
            color: #fff; border-radius: 12px; padding: 12px; font-size: 16px; outline: none; resize: none; margin-bottom: 10px; 
        }
        .speed-row { display: flex; align-items: center; color: #fff; font-size: 13px; margin: 10px 0; }
        input[type="range"] { flex: 1; margin: 0 15px; -webkit-appearance: none; background: rgba(255,255,255,0.2); height: 4px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; background: #fff; border-radius: 50%; }
        
        .btn-group { display: flex; gap: 12px; width: 100%; }
        button { flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.1s; }
        #mainBtn { background: #ff3b30; color: white; }
        #resetBtn { background: #3a3a3c; color: white; }
        
        /* 录制模式：隐藏输入框 */
        .recording-mode #textInput, .recording-mode h2 { display: none; }
        .recording-mode .control-panel { background: rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<div id="recIndicator"><div class="dot"></div> <span id="timer">00:00</span></div>
<video id="cameraView" autoplay playsinline muted></video>
<canvas id="prompterCanvas"></canvas>

<div class="ui-layer">
    <div class="control-panel">
        <h2 style="color: white; margin-top: 0; font-size: 18px; text-align: center;">🎬 提词一体机 v11</h2>
        <textarea id="textInput" placeholder="在此粘贴录像文案..."></textarea>
        <div class="speed-row">
            <span>🐢慢</span>
            <input type="range" id="speedInput" min="0.5" max="5" step="0.1" value="1.5">
            <span id="speedNum" style="min-width: 30px;">1.5</span>
            <span>快🐇</span>
        </div>
        <div class="btn-group">
            <button id="resetBtn" onclick="resetUI()">清空文案</button>
            <button id="mainBtn">开始录制</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('cameraView');
    const canvas = document.getElementById('prompterCanvas');
    const ctx = canvas.getContext('2d');
    const mainBtn = document.getElementById('mainBtn');
    const speedInput = document.getElementById('speedInput');
    const speedNum = document.getElementById('speedNum');
    const textInput = document.getElementById('textInput');

        try {
            stream = await navigator.mediaDevices.getUserMedia({ 
                video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                audio: true 
            });
            video.srcObject = stream;
            resize();
        } catch (err) { alert("请在 Safari 设置中允许摄像头权限。"); }
    }

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.onresize = resize;
    speedInput.oninput = () => { speedNum.innerText = speedInput.value; };

            if (char === '\n') { lines.push(line); line = ''; continue; }
            if (ctx.measureText(line + char).width > maxWidth) { lines.push(line); line = char; }
            else line += char;
        }
        lines.push(line);
        return lines;
    }

            if (drawY > 100 && drawY < 400) ctx.fillText(line, canvas.width / 2, drawY);
        });
        requestAnimationFrame(render);
    }
