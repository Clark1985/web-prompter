<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>提词相机 v18.0 原生稳定版</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; font-family: -apple-system, sans-serif; }
        /* 相机背景：录制这个层 */
        #cameraView { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; transform: scaleX(-1); }
        /* 提词器：叠在上面，仅供肉眼看，录制器抓不到它 */
        #prompterCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        
        #recIndicator { position: absolute; top: 50px; left: 20px; z-index: 4; display: none; align-items: center; color: white; font-size: 14px; font-weight: bold; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 20px; }
        .dot { width: 10px; height: 10px; background: #ff3b30; border-radius: 50%; margin-right: 8px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

        .ui-layer { position: absolute; bottom: 40px; left: 0; width: 100%; z-index: 3; display: flex; flex-direction: column; align-items: center; }
        .control-panel { background: rgba(0,0,0,0.7); padding: 20px; border-radius: 24px; width: 90%; max-width: 450px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); box-sizing: border-box; }
        #textInput { width: 100%; height: 100px; background: rgba(255,255,255,0.1); border: 1px solid #444; color: #fff; border-radius: 12px; padding: 12px; font-size: 16px; outline: none; resize: none; margin-bottom: 10px; }
        .speed-row { display: flex; align-items: center; color: #fff; font-size: 13px; margin: 10px 0; }
        input[type="range"] { flex: 1; margin: 0 15px; -webkit-appearance: none; background: rgba(255,255,255,0.2); height: 4px; border-radius: 2px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 26px; height: 26px; background: #fff; border-radius: 50%; }
        .btn-group { display: flex; gap: 12px; width: 100%; }
        button { flex: 1; padding: 16px; border-radius: 14px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
        #mainBtn { background: #ff3b30; color: white; }
        .recording-mode #textInput, .recording-mode h2 { display: none; }
    </style>
</head>
<body>

<div id="recIndicator"><div class="dot"></div> <span id="timer">00:00</span></div>
<video id="cameraView" autoplay playsinline muted></video>
<canvas id="prompterCanvas"></canvas>

<div class="ui-layer">
    <div class="control-panel">
        <h2 style="color: white; margin-top: 0; font-size: 18px; text-align: center;">🎬 提词一体机 v18</h2>
        <textarea id="textInput" placeholder="在此粘贴录像文案..."></textarea>
        <div class="speed-row">
            <span>🐢慢</span>
            <input type="range" id="speedInput" min="0.5" max="5" step="0.1" value="1.3">
            <span id="speedNum" style="min-width: 30px;">1.3</span>
            <span>快🐇</span>
        </div>
        <div class="btn-group">
            <button onclick="location.reload()" style="background:#3a3a3c; color:white;">刷新</button>
            <button id="mainBtn">开启相机</button>
        </div>
    </div>
</div>

<script>
    const video = document.getElementById('cameraView');
    const canvas = document.getElementById('prompterCanvas');
    const ctx = canvas.getContext('2d');
    const mainBtn = document.getElementById('mainBtn');
    const speedInput = document.getElementById('speedInput');
    const speedNum = document.getElementById('speedNum');
    const textInput = document.getElementById('textInput');
    
    let isRecording = false, startTime, textLines = [], mediaRecorder, recordedChunks = [], timerInterval, stream = null;

    mainBtn.onclick = async () => {
        // 第一步：开启 1080P 相机流
        if (!stream) {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: 1920, height: 1080 }, 
                    audio: true 
                });
                video.srcObject = stream;
                mainBtn.innerText = "开始录制";
                resize();
                return;
            } catch (err) {
                alert("1080P 调用失败。");
                return;
            }
        }

        // 第二步：开始录制
        if (!isRecording) {
            const content = textInput.value.trim();
            if (!content) return alert("请先输入文案");

            isRecording = true;
            document.body.classList.add('recording-mode');
            mainBtn.innerText = "停止并保存";
            textLines = getLines(content);
            startTime = Date.now();
            recordedChunks = [];

            // 【重磅改进】：直接录制原生 stream，不通过 canvas。性能提升 1000%
            mediaRecorder = new MediaRecorder(stream, {
                mimeType: 'video/mp4',
                videoBitsPerSecond: 6000000 // 6Mbps 超清码率
            });

            mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const blob = new Blob(recordedChunks, { type: 'video/mp4' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `超清录制_${Date.now()}.mp4`;
                a.click();
            };

            mediaRecorder.start(); 
            document.getElementById('recIndicator').style.display = 'flex';
            startTimer();
            animate();
        } else {
            stopRec();
        }
    };

    function stopRec() {
        isRecording = false;
        mediaRecorder.stop(); 
        clearInterval(timerInterval);
        document.body.classList.remove('recording-mode');
        document.getElementById('recIndicator').style.display = 'none';
        mainBtn.innerText = "开始录制";
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.onresize = resize;
    speedInput.oninput = () => { speedNum.innerText = speedInput.value; };

    function getLines(text) {
        ctx.font = 'bold 36px sans-serif';
        const lines = [], chars = text.split(''), maxWidth = canvas.width * 0.85;
        let line = '';
        for (let char of chars) {
            if (char === '\n') { lines.push(line); line = ''; continue; }
            if (ctx.measureText(line + char).width > maxWidth) { lines.push(line); line = char; }
            else line += char;
        }
        lines.push(line);
        return lines;
    }

    function animate() {
        if (!isRecording) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 提词阴影背景
        ctx.fillStyle = "rgba(0,0,0,0.4)";
        ctx.fillRect(0, 100, canvas.width, 320);
        
        ctx.fillStyle = '#00FF00'; ctx.font = 'bold 38px sans-serif'; ctx.textAlign = 'center';
        const elapsed = (Date.now() - startTime) / 1000;
        const speed = parseFloat(speedInput.value);
        let yPos = 400 - (speed * elapsed * 24); 

        textLines.forEach((line, i) => {
            const drawY = yPos + (i * 55);
            if (drawY > 100 && drawY < 420) ctx.fillText(line, canvas.width / 2, drawY);
        });
        requestAnimationFrame(animate);
    }

    function startTimer() {
        let s = 0;
        document.getElementById('timer').innerText = "00:00";
        timerInterval = setInterval(() => {
            s++;
            const m = String(Math.floor(s / 60)).padStart(2, '0');
            const sec = String(s % 60).padStart(2, '0');
            document.getElementById('timer').innerText = `${m}:${sec}`;
        }, 1000);
    }
</script>
</body>
</html>
